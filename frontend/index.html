<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Casino SaaS Demo</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
  text-align:center;
}

.container {
  max-width:400px;
  margin:50px auto;
  padding:20px;
  background:#141b2d;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,255,200,0.2);
}

h1 { color:#00ffcc; }

.slot {
  font-size:50px;
  margin:20px 0;
}

button {
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.spin { background:#00ffcc; }
.bet { background:#ffcc00; }

input {
  padding:10px;
  width:80%;
  margin:10px 0;
  border-radius:6px;
  border:none;
  text-align:center;
}

.wallet {
  font-size:18px;
  margin:10px 0;
  color:#00ffcc;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎰 Casino Demo</h1>

  <div class="wallet">Wallet: $<span id="wallet">1000</span></div>

  <input id="bet" type="number" value="10" />

  <div class="slot" id="slot">🍒 🍋 🍇</div>

  <button class="spin" onclick="spin()">SPIN</button>
  <button class="bet" onclick="addMoney()">+100</button>
</div>

<script>
let wallet = 1000;

function updateWallet(){
  document.getElementById("wallet").innerText = wallet;
}

function addMoney(){
  wallet += 100;
  updateWallet();
}

function spin(){
  let bet = parseInt(document.getElementById("bet").value);

  if(wallet < bet){
    alert("Not enough balance!");
    return;
  }

  wallet -= bet;

  const icons = ["🍒","🍋","🍇","🔔","⭐","7️⃣"];

  let r1 = icons[Math.floor(Math.random()*icons.length)];
  let r2 = icons[Math.floor(Math.random()*icons.length)];
  let r3 = icons[Math.floor(Math.random()*icons.length)];

  document.getElementById("slot").innerText = `${r1} ${r2} ${r3}`;

  if(r1 === r2 && r2 === r3){
    let win = bet * 10;
    wallet += win;
    alert("JACKPOT! +$" + win);
  }

  updateWallet();
}

updateWallet();
</script>

</body>
</html>
